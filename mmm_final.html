<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>短線雷達</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white;}
.container { padding:10px;}
.card {
  background:#1e293b;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.up { color:#ff6b6b;}
.down { color:#4ade80;}
.tag { padding:4px 10px; border-radius:6px; font-size:12px;}
.good { background:#16a34a;}
warn { background:#dc2626;}
.wait { background:#eab308;}
button {
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
<h2>📊 短線雷達</h2>
<button onclick="loadStocks()">🔄 更新</button>
<div id="list">載入中...</div>
</div>

<script>
async function loadStocks(){

document.getElementById("list").innerHTML = "抓資料中...";

try{

// 用 proxy 避開限制
const api = "https://api.allorigins.win/raw?url=";
const target = "https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_2344.tw|tse_2408.tw|tse_2610.tw|tse_2618.tw|tse_2609.tw|tse_2603.tw";

const res = await fetch(api + encodeURIComponent(target));
const data = await res.json();

let html = "";

data.msgArray.forEach(s => {

let price = parseFloat(s.z);
let prev = parseFloat(s.y);

if(!price || !prev) return;

let percent = ((price - prev) / prev * 100).toFixed(2);

if(price >= 20 && price <= 40){

let tag = "";
let cls = "";

if(percent >= 3 && percent <= 6){
  tag = "🔥 可觀察";
  cls = "good";
}else if(percent > 6){
  tag = "⚠️ 過熱";
  cls = "warn";
}else{
  tag = "🟡 等發動";
  cls = "wait";
}

html += `
<div class="card">
<h3>${s.n}</h3>
<p>💰 ${price}</p>
<p class="${percent>0?'up':'down'}">📈 ${percent}%</p>
<p class="tag ${cls}">${tag}</p>
</div>
`;

}

});

document.getElementById("list").innerHTML = html || "今天沒有符合條件";

}catch(e){
document.getElementById("list").innerHTML = "資料抓不到（可能API暫時不穩）";
}

}

loadStocks();
</script>

</body>
</html>
