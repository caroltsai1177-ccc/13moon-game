<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>13月亮共時旅程 - 卓爾金曆版</title>
<style>
/* 🎲 骰子與基礎動畫 */
@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }

/* 🎨 基礎排版 */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#111;color:#fff;padding:10px}
h1{text-align:center;font-size:1.5em;margin-bottom:10px}

/* 🗺️ 卓爾金曆地圖佈局 */
.board-container {
    background: #222;
    padding: 10px;
    border-radius: 10px;
    overflow-x: auto; /* iPad 橫向滑動 */
    margin-bottom: 20px;
}
.tzolkin-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr); /* 13 列 */
    grid-template-rows: repeat(20, 1fr);    /* 20 行 */
    gap: 2px;
    min-width: 500px;
    margin: 0 auto;
}
.kin-cell {
    aspect-ratio: 1;
    border-radius: 2px;
    font-size: 0.6em;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    position: relative;
    font-weight: bold;
}
/* 顏色類別 */
.kin-red { background: #ff6b6b; }
.kin-white { background: #f8f8f8; }
.kin-blue { background: #4dabf7; }
.kin-yellow { background: #ffd43b; }
.kin-gap { background: #69db7c; border: 1px solid #fff; } /* 綠色/紫色底統一為綠卡區 */
.kin-mystic { background: #b197fc; border: 1px solid #fff; } /* 核心中柱 */

.kin-cell.current {
    transform: scale(1.2);
    z-index: 10;
    box-shadow: 0 0 10px #fff;
    outline: 2px solid #fff;
}

/* 🃏 卡片區域 */
.card-area { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; min-height: 180px; }
.card { background: #333; padding: 15px; border-radius: 10px; border-left: 8px solid #ccc; }
.card.red { border-color: #ff6b6b; }
.card.white { border-color: #f8f8f8; }
.card.blue { border-color: #4dabf7; }
.card.yellow { border-color: #ffd43b; }
.card.green { border-color: #69db7c; }

.status-bar { display: flex; justify-content: space-around; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
.dice-btn { background: #667eea; border: none; color: white; padding: 12px 30px; border-radius: 25px; cursor: pointer; width: 100%; margin: 10px 0; font-size: 1.1em; }
.score-btn { padding: 8px 15px; border-radius: 15px; border: none; cursor: pointer; margin-top: 5px; background: #69db7c; }
</style>
</head>
<body>

<h1>🌙 卓爾金曆共時旅程</h1>

<div class="status-bar">
    <div>位置: <span id="current-kin">1</span></div>
    <div>總分: <span id="total-score">0</span></div>
</div>

<div class="board-container">
    <div class="tzolkin-grid" id="tzolkin-grid"></div>
</div>

<div class="dice-area" style="text-align: center;">
    <button class="dice-btn" id="roll-btn" onclick="rollDice()">🎲 擲骰子前進</button>
    <div id="dice-result" style="font-size: 1.5em; margin: 5px 0;"></div>
</div>

<div class="card-area">
    <div id="card-display"></div>
    <div id="score-response"></div>
</div>

<script>
// 📌 核心資料與變數
let gameState = { currentKin: 1, totalScore: 0 };
const GAP_DAYS = [1, 20, 22, 39, 43, 58, 64, 77, 88, 93, 96, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 146, 147, 148, 149, 150, 151, 152, 153, 154, 155, 165, 168, 173, 184, 197, 203, 218, 222, 239, 241, 260];

// 🎨 判定格子顏色與牌組
function getKinType(k) {
    if (GAP_DAYS.includes(k) || (k >= 121 && k <= 140)) return 'green'; // 綠色底與紫色底 (中柱)
    const seal = (k - 1) % 4;
    if (seal === 0) return 'red';
    if (seal === 1) return 'white';
    if (seal === 2) return 'blue';
    return 'yellow';
}

// 🗺️ 初始化卓爾金曆地圖 (20行 x 13列)
function initBoard() {
    const grid = document.getElementById('tzolkin-grid');
    grid.innerHTML = '';
    // 卓爾金曆排列：由上而下，由左而右
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type === 'green' ? (k >= 121 && k <= 140 ? 'mystic' : 'gap') : type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const currentCell = document.getElementById(`kin-${gameState.currentKin}`);
    if (currentCell) currentCell.classList.add('current');
    document.getElementById('current-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
}

// 🎲 擲骰子與循環邏輯
function rollDice() {
    const btn = document.getElementById('roll-btn');
    const res = document.getElementById('dice-result');
    btn.disabled = true;
    res.classList.add('dice-rolling');
    
    let count = 0;
    const anim = setInterval(() => {
        res.textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 10) {
            clearInterval(anim);
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            const total = d1 + d2;
            res.classList.remove('dice-rolling');
            res.textContent = `🎲 ${d1} + ${d2} = ${total}`;
            
            // 🔄 循環邏輯：超過 260 回到 1
            gameState.currentKin = ((gameState.currentKin + total - 1) % 260) + 1;
            
            updateUI();
            setTimeout(drawCard, 600);
            btn.disabled = false;
        }
    }, 60);
}

// 🃏 抽牌邏輯 (根據顏色隨機抽)
const cardPool = {
    red: [{type:'發揮力量', text:'紅龍：我鬆綁原生家庭舊有模式的DNA?'}, {type:'知與行', text:'紅蛇：善用金錢與賺取同樣重要。'}],
    white: [{type:'靈魂拷問', text:'白風：我多用溫柔肯定智慧的言語？'}],
    blue: [{type:'靈魂拷問', text:'藍手：我懂得愛惜身體，給予休息？'}],
    yellow: [{type:'發揮力量', text:'黃種子：我能看見自己的潛力？'}],
    green: [{type:'成就顯化', text:'邁向成就：我鬆綁原生家庭舊有模式。'}, {type:'奇蹟顯化', text:'白風：創造生命奇蹟。'}]
};

function drawCard() {
    const type = getKinType(gameState.currentKin);
    const pool = cardPool[type] || cardPool.red;
    const card = pool[Math.floor(Math.random() * pool.length)];
    
    const display = document.getElementById('card-display');
    display.innerHTML = `
        <div class="card ${type}">
            <div style="font-weight:bold; color:#888">${type.toUpperCase()} 區域</div>
            <h3>${card.type}</h3>
            <p>${card.text}</p>
        </div>
    `;
    // 清除舊的反應
    document.getElementById('score-response').innerHTML = '<p>已自動記錄旅程...</p>';
}

initBoard();
</script>
</body>
</html>
