tton class="score-btn no" onclick="answerNo()">❌ No (再骰)</button></div></div>';return}if(card.type==='知與行'){c.innerHTML='<div class="score-response"><p>你現在是什麼狀態？</p><div class="score-input"><button class="score-btn 實踐" onclick="answerZhiYu(5)">🌟 實踐 (+5)</button><button class="score-btn 領悟" onclick="answerZhiYu(3)">💡 領悟 (+3)</button><button class="score-btn 知道" onclick="answerZhiYu(0)">📖 知道 (+0)</button></div></div>';return}c.innerHTML=''}function answerYes(){gameState.totalScore+=5;gameState.cardScores['發揮力量']=(gameState.cardScores['發揮力量']||0)+5;document.getElementById('total-score').textContent=gameState.totalScore;document.getElementById('score-response').innerHTML='<div class="score-response">✅ Yes！獲得 <strong>+5</strong> 分！</div>'}function answerNo(){const d=Math.floor(Math.random()*6)+1,s=d%2===1?-3:-5;gameState.totalScore+=s;document.getElementById('total-score').textContent=gameState.totalScore;document.getElementById('score-response').innerHTML='<div class="score-response">再骰: '+d+' → <strong>'+(s>0?'+':'')+s+'</strong> 分</div>'}function answerZhiYu(s){gameState.totalScore+=s;gameState.cardScores['知與行']=(gameState.cardScores['知與行']||0)+s;document.getElementById('total-score').textContent=gameState.totalScore;const label=s===5?'🌟 實踐':s===3?'💡 領悟':'📖 知道';document.getElementById('score-response').innerHTML='<div class="score-response">'+label+'！獲得 <strong>'+(s>0?'+':'')+s+'</strong> 分</div>'}function endGame(){const b=document.getElementById('score-breakdown');b.innerHTML='<div class="score-item">🎴 總分:

<strong>'+gameState.totalScore+'</strong></div>'+Object.entries(gameState.cardScores).map(([t,s])=>'<div class="score-item">'+t+': <strong>'+s+'</strong></div>').join('');document.getElementById('game-end').classList.add('show')}function

restartGame(){gameState={currentKin:1,totalScore:0,diceHistory:[],cardScores:{'人生練習題':0,'天賦喚醒力':0,'發揮力量':0,'知與行':0}};document.getElementById('total-score').textContent='0';document.getElementById('dice-result').textContent='';document.getElementById('dice-history').textContent='';document.getElementById('card-display').innerHTML='';document.getElementById('score-response').innerHTML='';document.getElementById('card-title').textContent='等待抽卡...';document.getElementById('game-end').classList.remove('show');updateCurrentPosition()}function getColorEmoji(c){return{red:'🔴',white:'⚪',blue:'🔵',yellow:'🟡',green:'🟢'}[c]||'⚪'}initBoard();</script>
