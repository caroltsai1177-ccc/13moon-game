<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>13月亮共時旅程 - Carol 專業版 v0.4</title>
<style>
/* 🎲 骰子動畫 */
@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }

/* 🎨 iPad 最佳化排版 */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#0d0d1a;color:#fff;padding:10px;overflow-x:hidden}
h1{text-align:center;font-size:1.2em;margin-bottom:8px;color:#f8f8f8}

.status-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; margin-bottom: 10px; font-size: 0.9em; }

/* 🗺️ 卓爾金曆地圖：精準對齊圖表 */
.board-container {
    background: #1a1a2e;
    padding: 5px;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    width: 100%;
}
.tzolkin-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr); /* 讓13列平分寬度 */
    gap: 1.5px;
    width: 100%;
    max-width: 600px; /* 限制寬度避免格子太大 */
}
.kin-cell {
    aspect-ratio: 1; /* 保持正方形 */
    border-radius: 2px;
    font-size: 0.5em;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: bold;
}
/* 根據 Carol 的圖表定義顏色 */
.kin-red { background: #ff6b6b; }
.kin-white { background: #f8f8f8; }
.kin-blue { background: #4dabf7; }
.kin-yellow { background: #ffd43b; }
.kin-green { background: #69db7c; box-shadow: inset 0 0 5px rgba(255,255,255,0.8); } /* 綠/紫區塊 */

.kin-cell.current {
    background: #fff !important;
    color: #ff00ff !important;
    transform: scale(1.2);
    z-index: 10;
    box-shadow: 0 0 10px #fff;
    border-radius: 50%;
}

/* 🃏 卡片區域 */
.card-area { margin-top: 15px; padding-bottom: 30px; }
.card { background: #252545; padding: 15px; border-radius: 12px; border-top: 5px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
.card.red { border-color: #ff6b6b; }
.card.white { border-color: #f8f8f8; }
.card.blue { border-color: #4dabf7; }
.card.yellow { border-color: #ffd43b; }
.card.green { border-color: #69db7c; }

.dice-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 12px; border-radius: 25px; width: 100%; margin-top: 10px; font-size: 1.1em; font-weight: bold; }
.action-btn { background: #69db7c; color: #000; padding: 10px 20px; border-radius: 20px; border: none; margin-top: 10px; font-weight: bold; width: 100%; }
</style>
</head>
<body>

<div class="status-bar">
    <div>📍 KIN <span id="current-kin">1</span></div>
    <div>🏆 分數: <span id="total-score">0</span></div>
</div>

<div class="board-container">
    <div class="tzolkin-grid" id="tzolkin-grid"></div>
</div>

<div class="dice-area">
    <button class="dice-btn" id="roll-btn" onclick="rollDice()">🎲 擲骰子前進</button>
    <div id="dice-result" style="text-align:center; font-size: 1.1em; height: 25px; margin-top: 5px; color:#888;"></div>
</div>

<div class="card-area">
    <div id="card-display"></div>
    <div id="score-response"></div>
</div>

<script>
let gameState = { currentKin: 1, totalScore: 0 };

// 📌 嚴格對齊 Carol 圖表的綠色 (GAP) 與紫色 (中柱) 區域
const GREEN_KIN_LIST = [
    1, 20, 22, 39, 43, 58, 64, 77, 88, 93, 
    96, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115,
    121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138, 139, 140,
    146, 147, 148, 149, 150, 151, 152, 153, 154, 155, 165, 168, 173, 184, 197, 203, 218, 222, 239, 241, 260
];

function getKinType(k) {
    if (GREEN_KIN_LIST.includes(k)) return 'green';
    // 根據橫列判定底色
    const row = (k - 1) % 20 + 1;
    const colorIndex = (row - 1) % 4;
    return ['red', 'white', 'blue', 'yellow'][colorIndex];
}

function initBoard() {
    const grid = document.getElementById('tzolkin-grid');
    grid.innerHTML = '';
    // 卓爾金曆佈局：20 橫列，13 縱欄
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('current-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    const res = document.getElementById('dice-result');
    btn.disabled = true;
    res.classList.add('dice-rolling');
    let count = 0;
    const anim = setInterval(() => {
        res.textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 10) {
            clearInterval(anim);
            const total = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
            res.classList.remove('dice-rolling');
            res.textContent = `結果：${total}`;
            gameState.currentKin = ((gameState.currentKin + total - 1) % 260) + 1;
            updateUI();
            setTimeout(drawCard, 500);
            btn.disabled = false;
        }
    }, 60);
}

const cardPool = {
    red: [{type:'天賦喚醒力', text:'紅龍：開創精神。', score:5}],
    white: [{type:'天賦喚醒力', text:'白風：傳遞溫柔。', score:5}],
    blue: [{type:'天賦喚醒力', text:'藍手：實踐力量。', score:5}],
    yellow: [{type:'天賦喚醒力', text:'黃種子：綻放潛能。', score:5}],
    green: [
        {type:'靈魂拷問', text:'白風：是否覺察語言？', action:'soul'},
        {type:'成就顯化', text:'紅月：邁向成功。', action:'become'},
        {type:'奇蹟顯化', text:'白鏡：看見真實。', action:'magic'}
    ]
};

function drawCard() {
    const type = getKinType(gameState.currentKin);
    const pool = cardPool[type];
    const card = pool[Math.floor(Math.random() * pool.length)];
    const display = document.getElementById('card-display');
    const response = document.getElementById('score-response');
    
    display.innerHTML = `<div class="card ${type}"><small>${type.toUpperCase()} 區域</small><h3>${card.type}</h3><p>${card.text}</p></div>`;
    if (card.score) {
        gameState.totalScore += card.score;
        response.innerHTML = `<p>結算：+${card.score} 分</p>`;
        updateUI();
    } else {
        response.innerHTML = `<button class="action-btn" onclick="handleSpecial('${card.action}')">🎲 進行特殊擲骰</button>`;
    }
}

function handleSpecial(action) {
    const d = Math.floor(Math.random() * 6) + 1;
    let msg = "";
    if (action === 'soul') { gameState.totalScore += d; msg = `滿意度：🎲 ${d}，獲得 ${d} 分！`; }
    else if (action === 'become') { 
        const move = d * 5; 
        msg = `成就：前進 ${move} 步！`; 
        gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; 
    }
    else if (action === 'magic') { 
        const move = d * 10; 
        msg = `奇蹟：前進 ${move} 步！`; 
        gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; 
    }
    document.getElementById('score-response').innerHTML = `<p>${msg}</p>`;
    updateUI();
}

initBoard();
</script>
</body>
</html>
