<style>
/* 核心佈局：強制鎖定高度，禁止捲動 */
body { font-family: sans-serif; background: #0d0d1a; color: #fff; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

/* 回合設定彈窗 */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
.setup-box { background: #1a1a2e; padding: 25px; border-radius: 15px; border: 2px solid #667eea; text-align: center; width: 85%; max-width: 400px; }
.setup-input { background: #000; border: 1px solid #555; color: #fff; width: 60px; padding: 10px; border-radius: 5px; text-align: center; margin: 5px; font-size: 1.1em; }

#game-ui { display: none; width: 100%; height: 100%; flex-direction: row; }

/* 左側：棋盤與控制區 (佔 60% 寬度) */
.board-column { 
    flex: 1.4; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    border-right: 1px solid #333; 
    box-sizing: border-box; 
    background: #0d0d1a;
}

/* 狀態列 */
.top-status { height: 40px; display: flex; justify-content: space-around; align-items: center; background: rgba(255,255,255,0.05); font-size: 0.85em; color: #1dd1a1; flex-shrink: 0; }

/* 棋盤容器：強制根據剩餘高度收縮 */
.grid-container { 
    flex-grow: 1; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 0; /* 防止棋盤撐開父容器 */
    padding: 10px;
    position: relative;
}
.tzolkin-grid { 
    display: grid; 
    grid-template-columns: repeat(13, 1fr); 
    grid-template-rows: repeat(20, 1fr);
    gap: 1.5px; 
    width: 100%; 
    height: 100%; 
    max-height: 100%; /* 強制適應容器高度 */
}
.kin-cell { 
    background: #222; border-radius: 1px; font-size: 8px; 
    display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; 
}
.kin-red { background: #ee5253; } .kin-white { background: #f1f2f6; } 
.kin-blue { background: #2e86de; color: #fff; } .kin-yellow { background: #feca57; }
.kin-green { background: #1dd1a1; border: 1px solid #fff; color: #fff; }

/* 水晶柱：亮點特效 */
.kin-cell.active { 
    background: #fff !important; color: #ff00ff !important; 
    transform: scale(1.15); box-shadow: 0 0 12px #fff; 
    border-radius: 50%; z-index: 50; border: 2px solid #ff00ff; 
}

/* 底部操作區：絕對不被遮擋 */
.bottom-ctrl { 
    height: 130px; 
    flex-shrink: 0; 
    background: #111125; 
    padding: 10px; 
    border-top: 1px solid #444; 
    z-index: 100;
    display: flex; 
    flex-direction: column; 
    justify-content: center;
}
.btn-go { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 14px; border-radius: 25px; width: 100%; font-size: 1.2em; font-weight: bold; cursor: pointer; }
.btn-go:disabled { opacity: 0.3; cursor: not-allowed; }

#dice-num { height: 40px; font-size: 2.2em; text-align: center; font-weight: bold; color: #ffd43b; }

/* 右側：紀錄與卡牌區 (佔 40% 寬度) */
.info-column { flex: 1; display: flex; flex-direction: column; background: #0a0a15; padding: 12px; overflow-y: auto; }
.card-display { min-height: 150px; margin-bottom: 10px; }
.card { background: #252545; padding: 15px; border-radius: 10px; border-top: 6px solid #ccc; font-size: 0.95em; box-shadow: 0 5px 15px #000; }

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
.rolling { animation: pulse 0.1s infinite; }
</style>

// --- 核心邏輯引擎 ---
const G_KINS = [1,20,22,39,43,50,51,58,64,69,72,77,85,88,93,96,106,107,108,109,110,111,112,113,114,115,121,122,123,124,125,126,127,128,129,130,131,132,133,134,135,136,137,138,139,140,146,147,148,149,150,151,152,153,154,155,165,168,173,176,184,189,192,197,203,210,211,218,222,239,241,260];

let G = {
    round: 1, sK: 1, eK: 260, curK: 1,
    moved: 0, total: 0,
    scores: { red: 0, white: 0, blue: 0, yellow: 0, green: 0 },
    moving: false, activeCard: null, logs: [],
    moveTimer: null
};

function getType(k) {
    if (G_KINS.includes(k)) return 'green';
    return ['red', 'white', 'blue', 'yellow'][((k - 1) % 20) % 4];
}

function setupAndStart() {
    G.sK = parseInt(document.getElementById('k-start').value) || 1;
    G.eK = parseInt(document.getElementById('k-end').value) || 260;
    G.curK = G.sK;
    G.moved = 0;
    // 計算該局目標總步數
    G.total = (G.eK >= G.sK) ? (G.eK - G.sK) : ((260 - G.sK) + G.eK);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
    
    if(G.round === 1) buildBoard();
    refresh();
}

function buildBoard() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            cell.className = `kin-cell kin-${getType(k)}`;
            cell.id = `k-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
}

function refresh() {
    // 高效更新位置，避免 querySelectorAll
    const old = document.querySelector('.kin-cell.active');
    if (old) old.classList.remove('active');
    const target = document.getElementById(`k-${G.curK}`);
    if (target) target.classList.add('active');
    
    document.getElementById('ui-k').textContent = G.curK;
    document.getElementById('ui-r').textContent = G.round;

    let s = 0;
    Object.keys(G.scores).forEach(c => s += Math.max(0, G.scores[c]));
    document.getElementById('ui-s').textContent = s;

    if (G.moved >= G.total && !G.moving) {
        checkNextRound();
    }
}

// 核心修正：穩定版移動計時器
function doMove(steps) {
    if (G.moving) return;
    G.moving = true;
    document.getElementById('roll-btn').disabled = true;
    
    let stepsLeft = steps;
    
    G.moveTimer = setInterval(() => {
        if (stepsLeft <= 0 || G.moved >= G.total) {
            clearInterval(G.moveTimer);
            G.moving = false;
            document.getElementById('roll-btn').disabled = false;
            triggerDraw();
            return;
        }
        
        G.moved++;
        G.curK++;
        if (G.curK > 260) G.curK = 1;
        stepsLeft--;
        refresh();
    }, 400); // 你要求的 400-450ms 穩定動畫
}

function triggerDraw() {
    const type = getType(G.curK);
    const pool = masterCards.filter(m => m.color === type);
    const card = pool[Math.floor(Math.random() * pool.length)];
    G.activeCard = card;

    const area = document.getElementById('card-area');
    area.innerHTML = `
        <div class="card ${type}">
            <small>ID: ${card.id}</small>
            <h3>${card.type}</h3>
            <p>${card.text}</p>
            <div id="btn-box" style="margin-top:10px;"></div>
        </div>`;
    
    const box = document.getElementById('btn-box');
    if (card.rule === 'direct') {
        applyPoints(card.score, type);
        box.innerHTML = `<p style="color:#1dd1a1; font-weight:bold;">已校準共時頻率 (+${card.score*10})</p>`;
        addHistory(card.id, G.curK, type, card.type, card.score);
    } else if (card.rule === 'soul') {
        box.innerHTML = `<button class="btn-go" onclick="runSoul1()">🎲 判定靈魂分數</button>`;
    } else if (card.rule === 'power') {
        box.innerHTML = `<button class="btn-go" onclick="runPower1()">🎲 判定發揮力量</button>`;
    } else if (card.rule === 'knowledge') {
        box.innerHTML = `<button class="btn-go" onclick="runKnow()">🎲 判定知與行</button>`;
    } else {
        box.innerHTML = `<button class="btn-go" onclick="runMani()">🎲 進行顯化判定</button>`;
    }
}

// 判定邏輯修正
function runSoul1() {
    const r1 = Math.floor(Math.random()*6)+1;
    G.tS = r1;
    document.getElementById('btn-box').innerHTML = `<p>靈魂分數: ${r1}</p><button class="btn-go" onclick="runSoul2()">🎲 判定位移步數</button>`;
}
function runSoul2() {
    const r2 = Math.floor(Math.random()*6)+1;
    const s = G.tS * r2;
    applyPoints(G.tS, G.activeCard.color);
    addHistory(G.activeCard.id, G.curK, G.activeCard.color, `${G.activeCard.type}(${s}步)`, G.tS);
    doMove(s);
}

function runMani() {
    const r = Math.floor(Math.random()*6)+1;
    const isMagic = (G.activeCard.rule === 'magic');
    const score = isMagic ? 10 : 5;
    const s = r * (isMagic ? 10 : 5);
    applyPoints(score, G.activeCard.color);
    addHistory(G.activeCard.id, G.curK, G.activeCard.color, `${G.activeCard.type}(${s}步)`, score);
    doMove(s);
}

function applyPoints(s, color) {
    G.scores[color] += (s * 10);
    refresh();
}

function checkNextRound() {
    if (G.round < 3) {
        setTimeout(() => {
            alert(`第 ${G.round} 回合達成！`);
            G.round++;
            document.getElementById('setup-label').textContent = `第 ${G.round} 回合：設定旅程`;
            document.getElementById('overlay').style.display = 'flex';
        }, 500);
    } else {
        alert("恭喜！三回合旅程圓滿達成。");
    }
}

function addHistory(id, kin, color, type, score) {
    const body = document.getElementById('log-body');
    const row = body.insertRow(0);
    const s = score * 10;
    row.innerHTML = `<td>${G.round}</td><td>${kin}</td><td>${type}</td><td style="color:${s>=0?'#1dd1a1':'#ee5253'}"><b>${s>0?'+':''}${s}</b></td>`;
    G.logs.push([G.round, kin, type, s]);
}

function exportCSV() {
    let csv = "\uFEFF回合,KIN,類型,得分\n";
    G.logs.forEach(l => csv += l.join(",") + "\n");
    const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const u = URL.createObjectURL(b);
    const a = document.createElement("a");
    a.href = u; a.download = "Journey_Result.csv"; a.click();
}

function startDice() {
    if(G.moving) return;
    const d = document.getElementById('dice-num');
    d.className = 'rolling';
    setTimeout(() => {
        const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
        d.className = '';
        d.textContent = `🎲 ${d1+d2}`;
        doMove(d1+d2);
    }, 600);
}

// 沿用之前的判定函數 (Power, Knowledge)...
function runMani() {
    const r = Math.floor(Math.random() * 6) + 1;
    const isMagic = (G.activeCard.rule === 'magic');
    const score = isMagic ? 10 : 5;
    const s = r * (isMagic ? 10 : 5);
    applyPoints(score, G.activeCard.color);
    addHistory(G.activeCard.id, G.curK, G.activeCard.color, `${G.activeCard.type}(${s}步)`, score);
    doMove(s);
}

// 在這裡補上缺失的判定函式
function runPower1() {
    const r1 = Math.floor(Math.random() * 6) + 1;
    G.tS = r1;
    document.getElementById('btn-box').innerHTML = `
        <p>力量判定值: ${r1}</p>
        <button class="btn-go" onclick="runPower2()">🎲 判定位移步數</button>`;
}

function runPower2() {
    const r2 = Math.floor(Math.random() * 6) + 1;
    const s = G.tS + r2; 
    applyPoints(G.tS, G.activeCard.color);
    addHistory(G.activeCard.id, G.curK, G.activeCard.color, `${G.activeCard.type}(${s}步)`, G.tS);
    doMove(s);
}

function runKnow() {
    const r = Math.floor(Math.random() * 6) + 1;
    const score = G.activeCard.score; 
    applyPoints(score, G.activeCard.color);
    addHistory(G.activeCard.id, G.curK, G.activeCard.color, `${G.activeCard.type}(前進${r}步)`, score);
    doMove(r);
}

function applyPoints(s, color) { 
    G.scores[color] += (s * 10);
    refresh();
}

</script>
