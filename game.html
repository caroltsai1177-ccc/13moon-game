.kin-green { background: #1dd1a1; border: 1.2px solid #fff; color: #fff; }

.card-area { margin-top: 8px; text-align: left; max-width: 410px; margin: 0 auto; padding-bottom: 50px; }
.card { background: #252545; padding: 12px; border-radius: 10px; border-top: 8px solid #ccc; min-height: 120px; height: auto; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }

// ⚠️ 注意：這一行一定要放在上面資料的下面，確保程式能抓到紅+白
const masterCards = [...redData, ...whiteData]; 

const GREEN_KIN_MAP = [1,20,22,39,43,50,51,58,64,69,72,77,85,88,93,96,106,107,108,109,110,111,112,113,114,115,121,122,123,124,125,126,127,128,129,130,131,132,133,134,135,136,137,138,139,140,146,147,148,149,150,151,152,153,154,155,165,168,173,176,184,189,192,197,203,210,211,218,222,239,241,260];

function getKinType(k) { if (GREEN_KIN_MAP.includes(k)) return 'green'; const row = (k-1)%20+1; return ['red','white','blue','yellow'][(row-1)%4]; }

function startGame() {
    gameState.currentKin = parseInt(document.getElementById('start-kin').value) || 1;
    gameState.targetKin = parseInt(document.getElementById('end-kin').value) || 260;
    document.getElementById('display-target').textContent = gameState.targetKin;
    document.getElementById('game-setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    const allCards = [...redData, ...masterCardsChunk2];
    ['red','white','blue','yellow','green'].forEach(c => {
        currentPools[c] = allCards.filter(m => m.color === c).sort(() => Math.random() - 0.5);
    });
    initBoard();
}

function initBoard() {
    const grid = document.getElementById('tzolkin-grid'); grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('display-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
    if (gameState.currentKin >= gameState.targetKin && gameState.targetKin !== 1) {
        setTimeout(() => { alert(`🏁 旅程結算！抵達 KIN ${gameState.targetKin}。總分：${gameState.totalScore}`); document.getElementById('roll-btn').disabled = true; }, 600);
    }
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    const res = document.getElementById('dice-result');
    btn.disabled = true;
    res.className = 'dice-rolling';
    let count = 0;
    const anim = setInterval(() => {
        res.textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 12) {
            clearInterval(anim);
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            gameState.lastRoll = d1 + d2;
            res.className = 'dice-pop';
            res.textContent = `結果：${gameState.lastRoll}`;
            gameState.currentKin = ((gameState.currentKin + gameState.lastRoll - 1) % 260) + 1;
            updateUI();
            setTimeout(drawCard, 600);
            btn.disabled = false;
        }
    }, 60);
}

function drawCard() {
    const type = getKinType(gameState.currentKin);
    let pool = currentPools[type];
    if (!pool || pool.length === 0) { 
        alert(`${type} 池暫無資料，待錄入中...`); 
        return; 
    }
    const card = pool.pop();
    const display = document.getElementById('card-display');
    display.innerHTML = `<div class="card ${type}"><small>ID: ${card.id}</small><h3>${card.type}</h3><p>${card.text}</p><div class="pool-info">池餘: ${pool.length} 張</div></div>`;
    const res = document.getElementById('score-response');
    if (card.rule === 'direct') { applyScore(card.score); res.innerHTML = `<p>結算：${card.score > 0 ? '+' : ''}${card.score} 分</p>`; }
    else if (card.rule === 'power') { res.innerHTML = `<p>發揮力量判定：</p><button class="action-btn" onclick="rollPower1()">🎲 第一次擲骰 (Yes/No)</button>`; }
    else if (card.rule === 'knowledge') { res.innerHTML = `<button class="action-btn" onclick="handleKnowledge()">🎲 智慧判定</button>`; }
    else { res.innerHTML = `<button class="action-btn" onclick="handleSpecial('${card.rule}')">🎲 規則判定</button>`; }
}

function rollPower1() {
    const d = Math.floor(Math.random() * 6) + 1;
    const res = document.getElementById('score-response');
    if (d % 2 !== 0) { applyScore(5); res.innerHTML = `<p>第一骰：🎲 ${d} (單數) -> <strong>✅ Yes! +5分</strong></p>`; }
    else { res.innerHTML = `<p>第一骰：🎲 ${d} (雙數) -> <strong>❌ No! 請再骰判定扣分：</strong></p><button class="action-btn" onclick="rollPower2()" style="background:#ee5253; color:#fff;">🎲 第二次擲骰判定</button>`; }
}
function rollPower2() {
    const d = Math.floor(Math.random() * 6) + 1;
    const s = (d % 2 !== 0) ? -3 : -5;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>第二骰：🎲 ${d} -> <strong>結算 ${s} 分</strong></p>`;
}

function handleKnowledge() {
    const d = Math.floor(Math.random() * 6) + 1;
    let s = (d===1||d===6)?5 : (d===2||d===5)?3 : 0;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> <strong>+${s}分</strong></p>`;
}

function handleSpecial(rule) {
    const d = Math.floor(Math.random() * 6) + 1;
    let msg = "";
    if (rule === 'soul') { applyScore(d); msg = `滿意度：🎲 ${d} 分！`; }
    else if (rule === 'become') { 
        applyScore(5); const steps = gameState.lastRoll * 5;
        msg = `成就：+5分，顯化位移 $${gameState.lastRoll} \times 5 = ${steps}$ 步！`;
        gameState.currentKin = ((gameState.currentKin + steps - 1) % 260) + 1;
    } else if (rule === 'magic') { 
        applyScore(10); const steps = gameState.lastRoll * 10;
        msg = `奇蹟：+10分，顯化位移 $${gameState.lastRoll} \times 10 = ${steps}$ 步！`;
        gameState.currentKin = ((gameState.currentKin + steps - 1) % 260) + 1;
    }
    document.getElementById('score-response').innerHTML = `<p>${msg}</p>`;
    updateUI();
}

function applyScore(s) { gameState.totalScore += s; document.getElementById('total-score').textContent = gameState.totalScore; }

initBoard();
</script>
