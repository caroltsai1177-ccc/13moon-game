<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>13月亮共時旅程 - 333完備正式版</title>
<style>
/* 🎲 動畫與微縮介面 */
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-2px, 0px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.6); } 100% { transform: scale(1.2); } }
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }
.dice-stop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; color: #fff; font-size: 1.4em !important; font-weight: 900; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;user-select:none;}
body{font-family:-apple-system,sans-serif;background:#0d0d1a;color:#fff;padding:4px;text-align:center;overflow-x:hidden;font-size:12px;}

#game-setup { background: rgba(102,126,234,0.12); padding: 10px; border-radius: 12px; margin: 10px auto; max-width: 340px; border: 1px dashed #667eea; }
.setup-input { background: #1a1a2e; border: 1px solid #444; color: #fff; width: 50px; padding: 4px; border-radius: 4px; text-align: center; }

.status-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.08); padding: 5px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85em; }
.board-container { background: #1a1a2e; padding: 2px; border-radius: 6px; display: inline-block; width: 100%; max-width: 440px; }
.tzolkin-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; }
.kin-cell { aspect-ratio: 1; border-radius: 1px; font-size: 0.45em; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; position: relative; }

.kin-red { background: #ee5253; } .kin-white { background: #f1f2f6; } .kin-blue { background: #2e86de; color:#fff; } .kin-yellow { background: #feca57; }
.kin-green { background: #1dd1a1; border: 1px solid #fff; color:#fff; } 
.kin-cell.current { background: #fff !important; color: #ff00ff !important; transform: scale(1.1); box-shadow: 0 0 10px #fff; border-radius: 50%; z-index: 10; }

.card-area { margin-top: 5px; text-align: left; max-width: 400px; margin: 0 auto; padding-bottom: 30px; }
.card { background: #252545; padding: 12px; border-radius: 10px; border-top: 6px solid #ccc; min-height: 90px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
.card.red { border-color: #ee5253; } .card.white { border-color: #f1f2f6; } .card.blue { border-color: #2e86de; } .card.yellow { border-color: #feca57; } .card.green { border-color: #1dd1a1; }
.pool-info { font-size: 0.65em; color: #666; position: absolute; bottom: 5px; right: 8px; }

.dice-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 12px; border-radius: 25px; width: 100%; margin-top: 5px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
.action-btn { background: #1dd1a1; color: #000; padding: 8px; border-radius: 15px; border: none; margin-top: 8px; font-weight: bold; width: 100%; cursor: pointer; }
</style>
</head>
<body>

<div id="game-setup">
    <h3>🌙 旅程起迄設定</h3>
    <div style="margin:8px 0;">起點: <input type="number" id="start-kin" class="setup-input" value="1"> 終點: <input type="number" id="end-kin" class="setup-input" value="260"></div>
    <button class="action-btn" onclick="startGame()">正式啟動 13 月亮共時旅程</button>
</div>

<div id="game-ui" style="display:none;">
    <div class="status-bar">
        <div>📍 KIN <span id="display-kin">1</span></div>
        <div>🏁 目標: <span id="display-target">—</span></div>
        <div>🏆 分數: <span id="total-score">0</span></div>
    </div>
    <div class="board-container"><div class="tzolkin-grid" id="tzolkin-grid"></div></div>
    <button class="dice-btn" id="roll-btn" onclick="rollDice()">🎲 擲骰子前進</button>
    <div id="dice-result" style="height: 35px; line-height:35px; font-size:1.1em; margin-top:2px;"></div>
    <div class="card-area"><div id="card-display"></div><div id="score-response"></div></div>
</div>

<script>
let gameState = { currentKin: 1, targetKin: 260, totalScore: 0, lastRoll: 0, usedCards: new Set() };
let pools = { red: [], white: [], blue: [], yellow: [], green: [] };

// 📌 核心牌庫 (333 張架構示範，Carol 可按此格式持續增加文字)
const masterCards = [
    // 🔴 紅色池 (01, 05, 09, 13, 17)
    { id: '0101', color: 'red', type: '人生練習題', text: '看待人事物過度嚴肅太過認真。', score: -5, rule: 'direct' },
    { id: '0104', color: 'red', type: '天賦喚醒力', text: '擁有初生之犢不畏虎的開創精神。', score: 5, rule: 'direct' },
    { id: '0107', color: 'red', type: '發揮力量', text: '我鬆綁原生家庭舊有模式的DNA?', rule: 'power' },
    { id: '0501', color: 'red', type: '人生練習題', text: '切斷自我與身體連結，忽略訊息。', score: -5, rule: 'direct' },
    { id: '0901', color: 'red', type: '人生練習題', text: '過度沉溺在負向感受，成為受害者。', score: -5, rule: 'direct' },

    // ⚪ 白色池 (02, 06, 10, 14, 18)
    { id: '0201', color: 'white', type: '人生練習題', text: '人生長處於沒有明確方向，搖擺不定。', score: -5, rule: 'direct' },
    { id: '0211', color: 'white', type: '知與行', text: '我知道，真正的溝通是達到彼此的共識而非僅是說服。', score: 5, rule: 'knowledge' },
    { id: '0601', color: 'white', type: '人生練習題', text: '人生最大的遺憾，就是太早放棄。', score: -5, rule: 'direct' },
    { id: '0611', color: 'white', type: '知與行', text: '我知道，魔鬼藏在細節裡。', score: 5, rule: 'knowledge' },

    // 🔵 藍色池 (03, 07, 11, 15, 19)
    { id: '0301', color: 'blue', type: '人生練習題', text: '汲汲營營在名利，忽略心靈豐盛。', score: -5, rule: 'direct' },
    { id: '0701', color: 'blue', type: '人生練習題', text: '眼高手低，只想不做。', score: -5, rule: 'direct' },

    // 🟡 黃色池 (04, 08, 12, 16, 20)
    { id: '0401', color: 'yellow', type: '人生練習題', text: '追求多目標，資源分散。', score: -5, rule: 'direct' },
    { id: '1201', color: 'yellow', type: '人生練習題', text: '說話太一針見血，讓人容易受傷。', score: -5, rule: 'direct' },

    // 🟢 綠色池 (73張：包含尾數 14-16 & T)
    { id: '0114', color: 'green', type: '成就顯化', text: '星際聯盟連結創新家', rule: 'become' },
    { id: '0115', color: 'green', type: '奇蹟顯化', text: '重建失落古文明', rule: 'magic' },
    { id: 'T01', color: 'green', type: '靈魂拷問', text: '我當下的人生目標是？', rule: 'soul' },
    { id: 'T02', color: 'green', type: '靈魂拷問', text: '我當下最大的黑暗面是什麼？', rule: 'soul' }
];

const GREEN_KIN_MAP = [1,20,22,39,43,50,51,58,64,69,72,77,85,88,93,96,106,107,108,109,110,111,112,113,114,115,121,122,123,124,125,126,127,128,129,130,131,132,133,134,135,136,137,138,139,140,146,147,148,149,150,151,152,153,154,155,165,168,173,176,184,189,192,197,203,210,211,218,222,239,241,260];

function getKinType(k) {
    if (GREEN_KIN_MAP.includes(k)) return 'green';
    const row = (k - 1) % 20 + 1;
    return ['red', 'white', 'blue', 'yellow'][(row - 1) % 4];
}

function startGame() {
    gameState.currentKin = parseInt(document.getElementById('start-kin').value);
    gameState.targetKin = parseInt(document.getElementById('end-kin').value);
    document.getElementById('display-target').textContent = gameState.targetKin;
    document.getElementById('game-setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    
    // 初始化池子
    ['red','white','blue','yellow','green'].forEach(c => {
        pools[c] = masterCards.filter(m => m.color === c).sort(() => Math.random() - 0.5);
    });
    initBoard();
}

function initBoard() {
    const grid = document.getElementById('tzolkin-grid');
    grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('display-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
    
    // 結算判定
    if (gameState.currentKin >= gameState.targetKin && gameState.targetKin !== 1) {
        setTimeout(() => alert(`🏁 旅程結算！你已抵達目標 KIN ${gameState.targetKin}。\n總分：${gameState.totalScore}。`), 600);
        document.getElementById('roll-btn').disabled = true;
    }
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    const res = document.getElementById('dice-result');
    btn.disabled = true;
    res.className = 'dice-rolling';
    
    let count = 0;
    const anim = setInterval(() => {
        res.textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 10) {
            clearInterval(anim);
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            gameState.lastRoll = d1 + d2;
            res.className = 'dice-stop';
            res.textContent = `結果：${gameState.lastRoll}`;
            
            gameState.currentKin = ((gameState.currentKin + gameState.lastRoll - 1) % 260) + 1;
            updateUI();
            setTimeout(drawCard, 600);
            btn.disabled = false;
        }
    }, 60);
}

function drawCard() {
    const type = getKinType(gameState.currentKin);
    let pool = pools[type];
    
    // 🔄 Carol: 如果池子空了就洗牌，但 333 張全部補進去後基本不會抽空
    if (pool.length === 0) {
        pools[type] = masterCards.filter(m => m.color === type).sort(() => Math.random() - 0.5);
        pool = pools[type];
    }
    
    const card = pool.pop();
    const display = document.getElementById('card-display');
    display.innerHTML = `<div class="card ${type}"><small>ID: ${card.id}</small><h3>${card.type}</h3><p>${card.text}</p><div class="pool-info">剩餘: ${pool.length} 張</div></div>`;
    
    const res = document.getElementById('score-response');
    if (card.rule === 'direct') {
        applyScore(card.score);
        res.innerHTML = `<p>結算：${card.score > 0 ? '+' : ''}${card.score} 分</p>`;
    } else if (card.rule === 'power') {
        res.innerHTML = `<p>請點擊判定：</p><button class="action-btn" onclick="rollPower1()">🎲 第一骰 (Yes/No)</button>`;
    } else if (card.rule === 'knowledge') {
        res.innerHTML = `<button class="action-btn" onclick="handleKnowledge()">🎲 智慧判定</button>`;
    } else {
        res.innerHTML = `<button class="action-btn" onclick="handleSpecial('${card.rule}')">🎲 規則判定</button>`;
    }
}

function rollPower1() {
    const d = Math.floor(Math.random() * 6) + 1;
    const res = document.getElementById('score-response');
    if (d % 2 !== 0) { applyScore(5); res.innerHTML = `<p>第一骰：🎲 ${d} (單數) -> <strong>✅ Yes! +5分</strong></p>`; }
    else { res.innerHTML = `<p>第一骰：🎲 ${d} (雙數) -> <strong>❌ No! 請再骰：</strong></p><button class="action-btn" onclick="rollPower2()" style="background:#ee5253; color:#fff;">🎲 第二次擲骰判定扣分</button>`; }
}
function rollPower2() {
    const d = Math.floor(Math.random() * 6) + 1;
    const s = (d % 2 !== 0) ? -3 : -5;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>第二骰：🎲 ${d} -> <strong>結算 ${s} 分</strong></p>`;
}

function handleKnowledge() {
    const d = Math.floor(Math.random() * 6) + 1;
    let s = (d===1||d===6)?5 : (d===2||d===5)?3 : 0;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> <strong>+${s}分</strong></p>`;
}

function handleSpecial(rule) {
    const d = Math.floor(Math.random() * 6) + 1;
    let msg = "";
    if (rule === 'soul') { applyScore(d); msg = `滿意度：🎲 ${d} 分！`; }
    else if (rule === 'become') { 
        applyScore(5); const steps = gameState.lastRoll * 5; msg = `成就：+5分，顯化移動 $${gameState.lastRoll} \times 5 = ${steps}$ 步！`;
        gameState.currentKin = ((gameState.currentKin + steps - 1) % 260) + 1;
    } else if (rule === 'magic') { 
        applyScore(10); const steps = gameState.lastRoll * 10; msg = `奇蹟：+10分，跳躍位移 $${gameState.lastRoll} \times 10 = ${steps}$ 步！`;
        gameState.currentKin = ((gameState.currentKin + steps - 1) % 260) + 1;
    }
    document.getElementById('score-response').innerHTML = `<p>${msg}</p>`;
    updateUI();
}

function applyScore(s) { gameState.totalScore += s; document.getElementById('total-score').textContent = gameState.totalScore; }
</script>
</body>
</html>
