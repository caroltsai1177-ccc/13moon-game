<style>
/* 🎲 骰子 Pop 動畫 */
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-2px, 0px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
@keyframes popStop { 0% { transform: scale(1); } 50% { transform: scale(1.6); } 100% { transform: scale(1.2); } }
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }
.dice-pop { animation: popStop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; color: #fff; font-size: 2.2em !important; font-weight: 900; }

*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;user-select:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#0d0d1a;color:#fff;padding:4px;text-align:center;overflow-x:hidden;font-size:14px;}

/* 🛠️ 介面設計 */
#game-setup { background: rgba(102,126,234,0.12); padding: 15px; border-radius: 12px; margin: 10px auto; max-width: 320px; border: 1px dashed #667eea; }
.setup-input { background: #1a1a2e; border: 1px solid #444; color: #fff; width: 55px; padding: 6px; border-radius: 4px; text-align: center; font-size: 1.3em; }
.status-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.08); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 1em; }

/* 🗺️ 卓爾金曆地圖：數字變大 3 倍 */
.board-container { background: #1a1a2e; padding: 3px; border-radius: 8px; display: inline-block; width: 100%; max-width: 480px; }
.tzolkin-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1.5px; width: 100%; }
.kin-cell { aspect-ratio: 1; border-radius: 2px; font-size: 1.2em; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; }

.kin-red { background: #ee5253; } .kin-white { background: #f1f2f6; } .kin-blue { background: #2e86de; color: #fff; } .kin-yellow { background: #feca57; }
.kin-green { background: #1dd1a1; border: 1px solid #fff; color: #fff; } 
.kin-cell.current { background: #fff !important; color: #ff00ff !important; transform: scale(1.15); box-shadow: 0 0 15px #fff; border-radius: 50%; z-index: 10; border: 2px solid #ff00ff; }

/* 🃏 卡片與抽牌結果：字體加大 */
.card-area { margin-top: 10px; text-align: left; max-width: 420px; margin: 0 auto; padding-bottom: 50px; }
.card { background: #252545; padding: 16px; border-radius: 12px; border-top: 8px solid #ccc; min-height: 120px; position: relative; box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
.card h3 { font-size: 1.3em; margin-bottom: 6px; color: #fff; }
.card p { font-size: 1.2em; line-height: 1.5; color: #eee; word-break: break-all; }
.pool-info { font-size: 0.8em; color: #999; text-align: right; margin-top: 10px; font-weight: bold; }

/* 💡 抽牌判定結果顯示區 */
#score-response { margin-top: 15px; font-size: 1.4em; font-weight: bold; line-height: 1.6; text-align: center; color: #ffd43b; text-shadow: 0 0 5px rgba(0,0,0,0.5); }

.dice-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 16px; border-radius: 35px; width: 100%; margin-top: 10px; font-size: 1.4em; font-weight: bold; cursor: pointer; }
.action-btn { background: #1dd1a1; color: #000; padding: 14px; border-radius: 25px; border: none; margin-top: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.2em; }
</style>

    "黃戰士", "紅地球", "白鏡", "藍風暴", "黃太陽"
];

let gameState = {
    startKin: 1, currentKin: 1, targetKin: 260,
    totalDist: 0, movedDist: 0,
    scores: { red: 0, white: 0, blue: 0, yellow: 0, green: 0 },
    history: []
};

let currentPools = { red: [], white: [], blue: [], yellow: [], green: [] };
const GREEN_KIN_MAP = [1,20,22,39,43,50,51,58,64,69,72,77,85,88,93,96,106,107,108,109,110,111,112,113,114,115,121,122,123,124,125,126,127,128,129,130,131,132,133,134,135,136,137,138,139,140,146,147,148,149,150,151,152,153,154,155,165,168,173,176,184,189,192,197,203,210,211,218,222,239,241,260];

function getKinType(k) {
    if (GREEN_KIN_MAP.includes(k)) return 'green';
    const row = (k - 1) % 20 + 1;
    return ['red', 'white', 'blue', 'yellow'][(row - 1) % 4];
}

function startGame() {
    const start = parseInt(document.getElementById('start-kin').value) || 1;
    const target = parseInt(document.getElementById('end-kin').value) || 260;
    gameState.startKin = start;
    gameState.currentKin = start;
    gameState.targetKin = target;
    gameState.movedDist = 0;
    
    if (target >= start) { gameState.totalDist = target - start; } 
    else { gameState.totalDist = (260 - start) + target; }
    
    gameState.scores = { red: 0, white: 0, blue: 0, yellow: 0, green: 0 };
    document.getElementById('display-target').textContent = gameState.targetKin;
    document.getElementById('game-setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';

    // 初始化歷程表介面
    const cardArea = document.querySelector('.card-area');
    if (!document.getElementById('history-table')) {
        const tableDiv = document.createElement('div');
        tableDiv.id = 'history-log-container';
        tableDiv.innerHTML = `
            <h3 style="margin-top:30px; border-bottom:2px solid #667eea; padding-bottom:5px;">📊 旅程歷程回顧</h3>
            <table id="history-table" style="width:100%; margin-top:10px; border-collapse: collapse; font-size: 1.1em; text-align: left;">
                <thead><tr style="background:#252545;">
                    <th style="padding:8px; border:1px solid #444;">KIN</th>
                    <th style="padding:8px; border:1px solid #444;">圖騰</th>
                    <th style="padding:8px; border:1px solid #444;">內容</th>
                    <th style="padding:8px; border:1px solid #444;">分數</th>
                </tr></thead>
                <tbody id="history-body"></tbody>
            </table>`;
        cardArea.appendChild(tableDiv);
    } else { document.getElementById('history-body').innerHTML = ''; }

    ['red', 'white', 'blue', 'yellow', 'green'].forEach(c => {
        currentPools[c] = masterCards.filter(m => m.color === c).sort(() => Math.random() - 0.5);
    });
    initBoard();
}

function initBoard() {
    const grid = document.getElementById('tzolkin-grid'); grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            cell.className = `kin-cell kin-${getKinType(k)}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('display-kin').textContent = gameState.currentKin;
    let total = 0;
    Object.keys(gameState.scores).forEach(key => { total += Math.max(0, gameState.scores[key]); });
    document.getElementById('total-score').textContent = total;

    if (gameState.movedDist >= gameState.totalDist && gameState.totalDist > 0) {
        setTimeout(() => {
            let r = Math.max(0, gameState.scores.red), w = Math.max(0, gameState.scores.white), b = Math.max(0, gameState.scores.blue), y = Math.max(0, gameState.scores.yellow), g = Math.max(0, gameState.scores.green);
            alert(`🏁 旅程結算！\n\n🔴紅:${r} ⚪白:${w} 🔵藍:${b} 🟡黃:${y} 🟢綠:${g}\n------------------\n🌟 總顯化得分：${r+w+b+y+g}`);
            document.getElementById('roll-btn').disabled = true;
        }, 800);
    }
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    const res = document.getElementById('dice-result');
    btn.disabled = true;
    res.className = 'dice-rolling';
    res.style.fontSize = "2.2em"; 
    let count = 0;
    const anim = setInterval(() => {
        res.textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 12) {
            clearInterval(anim);
            const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
            res.className = 'dice-pop';
            res.textContent = `🎲 ${d1+d2}`;
            moveStep(d1 + d2);
            setTimeout(drawCard, 1000);
            btn.disabled = false;
        }
    }, 60);
}

function moveStep(steps) {
    const remaining = gameState.totalDist - gameState.movedDist;
    const actualMove = Math.min(steps, remaining);
    gameState.movedDist += actualMove;
    let newKin = (gameState.startKin + gameState.movedDist);
    while (newKin > 260) newKin -= 260; 
    gameState.currentKin = newKin;
    updateUI();
}

function drawCard() {
    const type = getKinType(gameState.currentKin);
    let pool = currentPools[type];
    if (pool.length === 0) {
        currentPools[type] = masterCards.filter(m => m.color === type).sort(() => Math.random() - 0.5);
        pool = currentPools[type];
    }
    const card = pool.pop();
    const display = document.getElementById('card-display');
    display.innerHTML = `<div class="card ${type}"><small>ID: ${card.id}</small><h3>${card.type}</h3><p>${card.text}</p><div class="pool-info">池餘: ${pool.length} 張</div></div>`;
    const res = document.getElementById('score-response');
    res.innerHTML = '';
    if (card.rule === 'direct') {
        applyScore(card.score, type);
        res.innerHTML = `<p>能量結算：${card.score > 0 ? '+' : ''}${card.score} 分</p>`;
        addLog(gameState.currentKin, type, card.type, card.score);
    } else if (card.rule === 'power') {
        res.innerHTML = `<button class="action-btn" onclick="rollPower1('${type}', '${card.type}')">🎲 判定發揮力量</button>`;
    } else if (card.rule === 'knowledge') {
        res.innerHTML = `<button class="action-btn" onclick="rollKnowledgeDice('${type}', '${card.type}')">🎲 判定知與行</button>`;
    } else {
        res.innerHTML = `<button class="action-btn" onclick="rollManifestDice('${card.rule}', '${type}', '${card.type}')">🎲 進行顯化判定</button>`;
    }
}

function applyScore(s, color) { gameState.scores[color] += s; updateUI(); }

// 📜 核心優化：將圖騰名稱加入歷程表
function addLog(kin, color, type, score) {
    const body = document.getElementById('history-body');
    const row = document.createElement('tr');
    // 從表格對應圖騰名稱 (KIN 1 -> SEAL_NAMES[0])
    const sealName = SEAL_NAMES[(kin - 1) % 20]; 
    const colorEmoji = {red:'🔴', white:'⚪', blue:'🔵', yellow:'🟡', green:'🟢'}[color];
    
    row.innerHTML = `
        <td style="padding:8px; border:1px solid #444; font-weight:bold;">${kin}</td>
        <td style="padding:8px; border:1px solid #444;">${sealName}</td>
        <td style="padding:8px; border:1px solid #444;">${colorEmoji} ${type}</td>
        <td style="padding:8px; border:1px solid #444; font-weight:bold; color:${score >= 0 ? '#1dd1a1' : '#ee5253'}">${score > 0 ? '+' : ''}${score}</td>
    `;
    body.insertBefore(row, body.firstChild);
}

function rollPower1(color, cardType) {
    const d = Math.floor(Math.random() * 6) + 1;
    const res = document.getElementById('score-response');
    if (d % 2 !== 0) { 
        applyScore(5, color); addLog(gameState.currentKin, color, cardType, 5);
        res.innerHTML = `<p>結果：🎲 ${d} -> ✅ +5分</p>`; 
    } else { res.innerHTML = `<p>結果：🎲 ${d} -> ❌ No! <button class="action-btn" onclick="rollPower2('${color}', '${cardType}')">🎲 再次判定</button></p>`; }
}
function rollPower2(color, cardType) {
    const d = Math.floor(Math.random() * 6) + 1;
    const s = (d % 2 !== 0) ? -3 : -5;
    applyScore(s, color); addLog(gameState.currentKin, color, cardType, s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> 結算 ${s} 分</p>`;
}
function rollKnowledgeDice(color, cardType) {
    const d = Math.floor(Math.random() * 6) + 1;
    let label = "", s = 0;
    if (d === 1 || d === 6) { label = "實踐"; s = 5; }
    else if (d === 2 || d === 5) { label = "領悟"; s = 3; }
    else { label = "知道"; s = 0; }
    applyScore(s, color); addLog(gameState.currentKin, color, `${cardType}(${label})`, s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> ${label} (+${s}分)</p>`;
}
function rollManifestDice(rule, color, cardType) {
    const d = Math.floor(Math.random() * 6) + 1;
    let s = (rule === 'magic') ? 10 : 5;
    let steps = d * (rule === 'magic' ? 10 : 5);
    applyScore(s, color); 
    addLog(gameState.currentKin, color, `${cardType}(位移${steps}步)`, s);
    document.getElementById('score-response').innerHTML = `<p>🎲 ${d} -> 前進 ${steps} 步！</p>`;
    moveStep(steps);
}

initBoard();
</script>
