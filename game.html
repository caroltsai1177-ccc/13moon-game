<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>13月亮共時旅程 - Carol 專業正式版 v1.6</title>
<style>
/* 🎲 Carol 專屬 UI 設計 */
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-2px, 0px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;user-select:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#0d0d1a;color:#fff;padding:4px;text-align:center;overflow-x:hidden;font-size:12px;}

/* 🛠️ 設定畫面 */
#game-setup { background: rgba(102,126,234,0.15); padding: 10px; border-radius: 10px; margin: 20px auto; max-width: 300px; border: 1px dashed #667eea; }
.setup-input { background: #1a1a2e; border: 1px solid #444; color: #fff; width: 50px; padding: 4px; border-radius: 4px; text-align: center; margin: 0 5px; }

.status-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.08); padding: 5px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85em; }

/* 🗺️ 地圖微縮 (20px 格子) */
.board-container { background: #1a1a2e; padding: 2px; border-radius: 6px; display: inline-block; width: 100%; max-width: 440px; }
.tzolkin-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; }
.kin-cell { aspect-ratio: 1; border-radius: 1px; font-size: 0.45em; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; position: relative; }

/* 🔴⚪🔵🟡🟢 顏色精確定義 - Carol 校正 */
.kin-red { background: #ee5253; } 
.kin-white { background: #f1f2f6; } 
.kin-blue { background: #2e86de; color: #fff; } 
.kin-yellow { background: #feca57; }
.kin-green { background: #1dd1a1; border: 1px solid #fff; color: #fff; box-shadow: inset 0 0 3px rgba(0,0,0,0.2); } 
.kin-cell.current { background: #fff !important; color: #ff00ff !important; transform: scale(1.1); box-shadow: 0 0 10px #fff; border-radius: 50%; z-index: 10; font-weight: 900; }

/* 🃏 卡片區域 */
.card-area { margin-top: 5px; text-align: left; max-width: 400px; margin: 0 auto; padding-bottom: 40px; }
.card { background: #252545; padding: 10px; border-radius: 8px; border-top: 6px solid #ccc; min-height: 85px; position: relative; }
.card small { font-size: 0.7em; color: #aaa; }
.card h3 { font-size: 0.95em; margin: 2px 0; }
.card p { font-size: 0.85em; line-height: 1.3; color: #eee; }
.card.red { border-color: #ee5253; } .card.white { border-color: #f1f2f6; } .card.blue { border-color: #2e86de; } .card.yellow { border-color: #feca57; } .card.green { border-color: #1dd1a1; }
.pool-info { font-size: 0.7em; color: #666; text-align: right; margin-top: 3px; }

.dice-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 10px; border-radius: 20px; width: 100%; margin-top: 4px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
.action-btn { background: #1dd1a1; color: #000; padding: 8px; border-radius: 15px; border: none; margin-top: 5px; font-weight: bold; width: 100%; cursor: pointer; }
</style>
</head>
<body>

<div id="game-setup">
    <h2>🚀 旅程設定</h2>
    <p style="margin: 10px 0;">起點 KIN: <input type="number" id="start-kin" class="setup-input" value="1"></p>
    <p style="margin: 10px 0;">終點 KIN: <input type="number" id="end-kin" class="setup-input" value="260"></p>
    <button class="action-btn" onclick="startGame()">開始進入旅程</button>
</div>

<div id="game-ui" style="display:none;">
    <div class="status-bar">
        <div>📍 KIN <span id="display-kin">1</span></div>
        <div>🏁 目標: <span id="display-target">260</span></div>
        <div>🏆 分數: <span id="total-score">0</span></div>
    </div>

    <div class="board-container"><div class="tzolkin-grid" id="tzolkin-grid"></div></div>

    <button class="dice-btn" id="roll-btn" onclick="rollDice()">🎲 擲骰子前進</button>
    <div id="dice-result" style="height: 18px; margin-top: 2px; color:#aaa;"></div>

    <div class="card-area">
        <div id="card-display"></div>
        <div id="score-response"></div>
    </div>
</div>

<script>
// 📌 核心狀態與牌池
let gameState = { currentKin: 1, targetKin: 260, totalScore: 0, drawnIds: new Set() };
let currentPool = { red: [], white: [], blue: [], yellow: [], green: [] };

// 🎴 根據 Carol Excel 資料校正後的牌庫 (示範錄入關鍵 ID)
const masterCards = [
    // 🔴 紅 (01, 05, 09, 13, 17)
    { id: '0101', prefix: 'red', type: '人生練習題', text: '看待人事物過度嚴肅太過認真，導致內在情緒張力較大。', score: -5, rule: 'direct' },
    { id: '0107', prefix: 'red', type: '發揮力量', text: '我鬆綁原生家庭舊有模式的DNA?', rule: 'power' },
    { id: '0501', prefix: 'red', type: '人生練習題', text: '切斷自我與身體的連結，忽略身體帶給我們的訊息。', score: -5, rule: 'direct' },
    // ⚪ 白 (02, 06, 10, 14, 18)
    { id: '0201', prefix: 'white', type: '人生練習題', text: '人生長處於沒有明確的方向，一下向右走、一下又向左走。', score: -5, rule: 'direct' },
    { id: '0211', prefix: 'white', type: '知與行', text: '我知道，真正的溝通是達到彼此的共識而非僅是說服。', score: 5, rule: 'knowledge' },
    { id: '0601', prefix: 'white', type: '人生練習題', text: '人生最大的遺憾，就是太早放棄。', score: -5, rule: 'direct' },
    { id: '1401', prefix: 'white', type: '人生練習題', text: '太專注在自身，而忽略他人的需要。', score: -5, rule: 'direct' },
    // 🔵 藍 (03, 07, 11, 15, 19)
    { id: '0301', prefix: 'blue', type: '人生練習題', text: '汲汲營營在名與利的價值觀，忽略生活與心靈的豐盛。', score: -5, rule: 'direct' },
    // 🟡 黃 (04, 08, 12, 16, 20)
    { id: '0401', prefix: 'yellow', type: '人生練習題', text: '同時追求多目標，造成專注力與資源的分散。', score: -5, rule: 'direct' },
    { id: '1201', prefix: 'yellow', type: '人生練習題', text: '說話太一針見血，過度犀利，讓人容易受傷。', score: -5, rule: 'direct' },
    // 🟢 綠 (尾數 14-16 或 T)
    { id: '0114', prefix: 'green', type: '成就顯化', text: '星際聯盟連結創新家', score: 5, rule: 'become' },
    { id: 'T01', prefix: 'green', type: '靈魂拷問', text: '我當下的人生目標是？', rule: 'soul' },
    { id: 'T02', prefix: 'green', type: '靈魂拷問', text: '我當下最大的黑暗面是什麼？', rule: 'soul' }
];

// 📌 地圖校正列表
const GREEN_KIN_LIST = [
    1, 20, 22, 39, 43, 50, 51, 58, 64, 69, 72, 77, 85, 88, 93, 96, 
    106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 
    121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138, 139, 140,
    146, 147, 148, 149, 150, 151, 152, 153, 154, 155, 165, 168, 173, 176, 184, 189, 192, 197, 203, 210, 211, 218, 222, 239, 241, 260
];

function getKinType(k) {
    if (GREEN_KIN_LIST.includes(k)) return 'green';
    const row = (k - 1) % 20 + 1;
    return ['red', 'white', 'blue', 'yellow'][(row - 1) % 4];
}

function startGame() {
    gameState.currentKin = parseInt(document.getElementById('start-kin').value) || 1;
    gameState.targetKin = parseInt(document.getElementById('end-kin').value) || 260;
    document.getElementById('display-target').textContent = gameState.targetKin;
    document.getElementById('game-setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    
    // 初始化不重複池
    shuffleAllPools();
    initBoard();
}

function shuffleAllPools() {
    ['red','white','blue','yellow','green'].forEach(color => {
        currentPool[color] = masterCards.filter(c => c.prefix === color && !gameState.drawnIds.has(c.id)).sort(() => Math.random() - 0.5);
        // 如果該池已空，且還有總牌，則重置歷史（洗牌）
        if (currentPool[color].length === 0) {
            masterCards.filter(c => c.prefix === color).forEach(c => gameState.drawnIds.delete(c.id));
            currentPool[color] = masterCards.filter(c => c.prefix === color).sort(() => Math.random() - 0.5);
        }
    });
}

function initBoard() {
    const grid = document.getElementById('tzolkin-grid');
    grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('display-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    btn.disabled = true;
    let count = 0;
    const anim = setInterval(() => {
        document.getElementById('dice-result').textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 10) {
            clearInterval(anim);
            const total = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
            document.getElementById('dice-result').textContent = `前進 ${total} 步`;
            gameState.currentKin = ((gameState.currentKin + total - 1) % 260) + 1;
            updateUI();
            
            if (gameState.currentKin === gameState.targetKin) {
                alert(`🏁 抵達終點 KIN ${gameState.targetKin}！總分：${gameState.totalScore}`);
            } else {
                setTimeout(drawCard, 400);
            }
            btn.disabled = false;
        }
    }, 60);
}

function drawCard() {
    const type = getKinType(gameState.currentKin);
    let pool = currentPool[type];
    if (pool.length === 0) { shuffleAllPools(); pool = currentPool[type]; }
    
    const card = pool.pop();
    gameState.drawnIds.add(card.id);
    
    const display = document.getElementById('card-display');
    display.innerHTML = `<div class="card ${type}"><small>ID: ${card.id} | ${type.toUpperCase()}</small><h3>${card.type}</h3><p>${card.text}</p><div class="pool-info">池餘: ${pool.length}</div></div>`;
    
    const res = document.getElementById('score-response');
    if (card.rule === 'direct') {
        applyScore(card.score);
        res.innerHTML = `<p>結算：${card.score > 0 ? '+' : ''}${card.score} 分</p>`;
    } else if (card.rule === 'power') {
        res.innerHTML = `<p>發揮力量判定：</p><button class="action-btn" onclick="rollPower1()">🎲 第一擲骰 (Yes/No)</button>`;
    } else if (card.rule === 'knowledge') {
        res.innerHTML = `<button class="action-btn" onclick="handleKnowledge()">🎲 智慧層次擲骰</button>`;
    } else {
        res.innerHTML = `<button class="action-btn" onclick="handleSpecial('${card.rule}')">🎲 執行規則</button>`;
    }
}

// 📏 發揮力量兩階段 (Carol 核心邏輯)
function rollPower1() {
    const d = Math.floor(Math.random() * 6) + 1;
    const res = document.getElementById('score-response');
    if (d % 2 !== 0) {
        applyScore(5);
        res.innerHTML = `<p>第一骰：🎲 ${d} (單數) -> <strong>✅ Yes! +5分</strong></p>`;
    } else {
        res.innerHTML = `<p>第一骰：🎲 ${d} (雙數) -> <strong>❌ No! 請再擲骰判定扣分：</strong></p>
        <button class="action-btn" onclick="rollPower2()" style="background:#ee5253; color:#fff;">🎲 第二擲骰判定</button>`;
    }
}
function rollPower2() {
    const d = Math.floor(Math.random() * 6) + 1;
    const s = (d % 2 !== 0) ? -3 : -5;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>第二骰：🎲 ${d} (${d%2!==0?'單數':'雙數'}) -> <strong>結算 ${s} 分</strong></p>`;
}

function handleKnowledge() {
    const d = Math.floor(Math.random() * 6) + 1;
    let s = (d===1||d===6)?5 : (d===2||d===5)?3 : 0;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> <strong>+${s}分</strong></p>`;
}

function handleSpecial(rule) {
    const d = Math.floor(Math.random() * 6) + 1;
    let msg = "";
    if (rule === 'soul') { applyScore(d); msg = `滿意度：🎲 ${d} 分！`; }
    else if (rule === 'become') { const move = d * 5; msg = `成就位移：前進 ${move} 步！`; gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; }
    else if (rule === 'magic') { const move = d * 10; msg = `奇蹟位移：跳躍 ${move} 步！`; gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; }
    document.getElementById('score-response').innerHTML = `<p>${msg}</p>`;
    updateUI();
}

function applyScore(s) { gameState.totalScore += s; document.getElementById('total-score').textContent = gameState.totalScore; }
</script>
</body>
</html>
