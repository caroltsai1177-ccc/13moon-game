<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>13月亮共時旅程 - Carol 專業正式版 v1.3</title>
<style>
/* 🎲 Carol 專屬微縮介面設計 */
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-2px, 0px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
.dice-rolling { animation: shake 0.1s infinite; color: #ffd43b; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#0d0d1a;color:#fff;padding:5px;text-align:center;overflow-x:hidden;font-size:12px;}
h1{font-size:1em;margin-bottom:4px;color:#f8f8f8}
.status-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 6px; margin-bottom: 6px; font-size: 0.8em; }

/* 🗺️ 地圖微縮佈局 */
.board-container { background: #1a1a2e; padding: 2px; border-radius: 6px; display: inline-block; width: 100%; max-width: 480px; margin: 0 auto; }
.tzolkin-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; width: 100%; }
.kin-cell { aspect-ratio: 1; border-radius: 1px; font-size: 0.5em; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

/* 🔴⚪🔵🟡🟢 精確顏色定義 */
.kin-red { background: #ee5253; } .kin-white { background: #f1f2f6; } .kin-blue { background: #2e86de; color: #fff; } .kin-yellow { background: #feca57; }
.kin-green { background: #1dd1a1; border: 1px solid #fff; color: #fff; box-shadow: inset 0 0 3px rgba(0,0,0,0.2); } 
.kin-cell.current { background: #fff !important; color: #ff00ff !important; transform: scale(1.1); box-shadow: 0 0 8px #fff; border-radius: 50%; z-index: 10; }

/* 🃏 卡片與按鈕微縮 */
.card-area { margin-top: 6px; text-align: left; max-width: 420px; margin: 0 auto; padding-bottom: 30px; }
.card { background: #252545; padding: 8px; border-radius: 8px; border-top: 5px solid #ccc; min-height: 90px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.card small { font-size: 0.7em; color: #aaa; }
.card h3 { font-size: 0.95em; margin: 2px 0; }
.card p { font-size: 0.9em; line-height: 1.3; color: #eee; }
.card.red { border-color: #ee5253; } .card.white { border-color: #f1f2f6; } .card.blue { border-color: #2e86de; } .card.yellow { border-color: #feca57; } .card.green { border-color: #1dd1a1; }

.dice-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 8px; border-radius: 20px; width: 100%; margin-top: 4px; font-size: 1em; font-weight: bold; cursor: pointer; }
.action-btn { background: #1dd1a1; color: #000; padding: 6px; border-radius: 12px; border: none; margin-top: 5px; font-weight: bold; width: 100%; cursor: pointer; font-size: 0.9em; }
</style>
</head>
<body>

<div class="status-bar"><div>📍 KIN <span id="current-kin">1</span></div><div>🏆 分數: <span id="total-score">0</span></div></div>

<div class="board-container">
    <div class="tzolkin-grid" id="tzolkin-grid"></div>
</div>

<button class="dice-btn" id="roll-btn" onclick="rollDice()">🎲 擲骰子前進</button>
<div id="dice-result" style="height: 18px; margin-top: 2px; color:#aaa; font-size: 0.8em;"></div>

<div class="card-area">
    <div id="card-display"></div>
    <div id="score-response"></div>
</div>

<script>
// 📌 Carol 的正式卡片庫 (根據 15 張截圖整理)
const masterCards = [
    // 🔴 紅 (01, 05, 09, 13, 17)
    { id: '0101', prefix: '01', type: '人生練習題', text: '看待人事物過度嚴肅，導致情緒張力較大。', score: -5, rule: 'direct' },
    { id: '0104', prefix: '01', type: '天賦喚醒力', text: '擁有初生之犢不畏虎的開創精神。', score: 5, rule: 'direct' },
    { id: '0107', prefix: '01', type: '發揮力量', text: '我鬆綁原生家庭舊有模式的DNA?', score: 5, rule: 'power' },
    { id: '0501', prefix: '05', type: '人生練習題', text: '切斷自我與身體連結，忽略身體帶來的訊息。', score: -5, rule: 'direct' },
    
    // ⚪ 白 (02, 06, 10, 14, 18)
    { id: '0201', prefix: '02', type: '人生練習題', text: '人生長處於沒有明確的方向，一下向右、一下向左走。', score: -5, rule: 'direct' },
    { id: '0204', prefix: '02', type: '天賦喚醒力', text: '成功學習瑜伽呼吸法，有意識地感受身體變化。', score: 5, rule: 'direct' },
    { id: '0211', prefix: '02', type: '知與行', text: '我知道，真正的溝通是達到彼此的共識而非僅是說服。', score: 5, rule: 'knowledge' },
    { id: '0601', prefix: '06', type: '人生練習題', text: '人生最大的遺憾，就是太早放棄。', score: -5, rule: 'direct' },
    { id: '0604', prefix: '06', type: '天賦喚醒力', text: '我擅長梳理及彙整大家的資訊，是最佳整合者。', score: 5, rule: 'direct' },
    { id: '1401', prefix: '14', type: '人生練習題', text: '太專注在自身，而忽略他人的需要。', score: -5, rule: 'direct' },
    { id: '1811', prefix: '18', type: '知與行', text: '我知道，魔鬼藏在細節裡。', score: 5, rule: 'knowledge' },
    
    // 🔵 藍 (03, 07, 11, 15, 19)
    { id: '0301', prefix: '03', type: '人生練習題', text: '汲汲營營在名與利的價值觀，忽略心靈豐盛。', score: -5, rule: 'direct' },
    { id: '0311', prefix: '03', type: '知與行', text: '我知道，夢想一定要有的，萬一實現了呢！', score: 5, rule: 'knowledge' },
    
    // 🟡 黃 (04, 08, 12, 16, 20)
    { id: '0401', prefix: '04', type: '人生練習題', text: '同時追求多目標，造成專注力與資源的分散。', score: -5, rule: 'direct' },
    { id: '1201', prefix: '12', type: '人生練習題', text: '說話太一針見血，過度犀利，讓人容易受傷。', score: -5, rule: 'direct' },
    
    // 🟢 綠 (尾數 14-16 或 T)
    { id: '0114', prefix: 'green', type: '成就顯化', text: '星際聯盟連結創新家', score: 5, rule: 'become' },
    { id: '0214', prefix: 'green', type: '成就顯化', text: '星際聯盟靈魂療癒整樂家', score: 5, rule: 'become' },
    { id: '0115', prefix: 'green', type: '奇蹟顯化', text: '重建失落的古文明，揭開人類神秘起源', score: 10, rule: 'magic' },
    { id: '0116', prefix: 'green', type: '宇宙訊息', text: '你可以安心回到宇宙的懷抱，一切都被接住。', score: 5, rule: 'direct' },
    { id: 'T01', prefix: 'green', type: '靈魂拷問', text: '我當下的人生目標是？', rule: 'soul' },
    { id: 'T02', prefix: 'green', type: '靈魂拷問', text: '我當下最大的黑暗面是什麼？', rule: 'soul' }
];

let gameState = { currentKin: 1, totalScore: 0 };
let pools = { red: [], white: [], blue: [], yellow: [], green: [] };

// 📌 Carol 的精確校正地圖 (211 綠, 169/193 紅)
const GREEN_KIN_MAP = [
    1, 20, 22, 39, 43, 50, 51, 58, 64, 69, 72, 77, 85, 88, 93, 96, 
    106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 146, 147, 148, 149, 150, 151, 152, 153, 154, 155, 
    165, 168, 173, 176, 184, 189, 192, 197, 203, 210, 
    211, // 校正：綠色
    218, 222, 239, 241, 260,
    121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138, 139, 140
];

function getKinType(k) {
    if (GREEN_KIN_MAP.includes(k)) return 'green';
    const row = (k - 1) % 20 + 1;
    return ['red', 'white', 'blue', 'yellow'][(row - 1) % 4];
}

// 📌 洗牌機制：確保不重複
function shufflePools() {
    pools.green = masterCards.filter(c => c.prefix === 'green').sort(() => Math.random() - 0.5);
    const map = { red: ['01','05','09','13','17'], white: ['02','06','10','14','18'], blue: ['03','07','11','15','19'], yellow: ['04','08','12','16','20'] };
    ['red', 'white', 'blue', 'yellow'].forEach(color => {
        pools[color] = masterCards.filter(c => map[color].includes(c.prefix) && !c.id.startsWith('T') && parseInt(c.id.slice(-2)) <= 13).sort(() => Math.random() - 0.5);
    });
}

function initBoard() {
    shufflePools();
    const grid = document.getElementById('tzolkin-grid');
    grid.innerHTML = '';
    for (let row = 1; row <= 20; row++) {
        for (let col = 1; col <= 13; col++) {
            const k = (col - 1) * 20 + row;
            const cell = document.createElement('div');
            const type = getKinType(k);
            cell.className = `kin-cell kin-${type}`;
            cell.id = `kin-${k}`;
            cell.textContent = k;
            grid.appendChild(cell);
        }
    }
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.kin-cell').forEach(c => c.classList.remove('current'));
    const cur = document.getElementById(`kin-${gameState.currentKin}`);
    if (cur) cur.classList.add('current');
    document.getElementById('current-kin').textContent = gameState.currentKin;
    document.getElementById('total-score').textContent = gameState.totalScore;
}

function rollDice() {
    const btn = document.getElementById('roll-btn');
    btn.disabled = true;
    let count = 0;
    const anim = setInterval(() => {
        document.getElementById('dice-result').textContent = `🎲 ${Math.floor(Math.random()*6)+1} + ${Math.floor(Math.random()*6)+1}`;
        if (++count > 10) {
            clearInterval(anim);
            const total = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
            document.getElementById('dice-result').textContent = `前進 ${total} 步`;
            gameState.currentKin = ((gameState.currentKin + total - 1) % 260) + 1;
            updateUI();
            setTimeout(drawCard, 400);
            btn.disabled = false;
        }
    }, 60);
}

function drawCard() {
    const type = getKinType(gameState.currentKin);
    let pool = pools[type];
    if (pool.length === 0) { shufflePools(); pool = pools[type]; }
    
    // 抽出一張 (不重複)
    const card = pool.pop();
    
    const display = document.getElementById('card-display');
    display.innerHTML = `<div class="card ${type}"><small>ID: ${card.id} | ${type.toUpperCase()}</small><h3>${card.type}</h3><p>${card.text}</p></div>`;
    
    const res = document.getElementById('score-response');
    if (card.rule === 'direct') {
        applyScore(card.score);
        res.innerHTML = `<p>結算：${card.score > 0 ? '+' : ''}${card.score} 分</p>`;
    } else if (card.rule === 'power') {
        res.innerHTML = `<p>發揮力量判定：</p><button class="action-btn" onclick="rollPower1()">🎲 第一次擲骰 (Yes/No)</button>`;
    } else if (card.rule === 'knowledge') {
        res.innerHTML = `<button class="action-btn" onclick="handleKnowledge()">🎲 智慧層次擲骰</button>`;
    } else {
        res.innerHTML = `<button class="action-btn" onclick="handleSpecial('${card.rule}')">🎲 執行規則擲骰</button>`;
    }
}

// 📏 發揮力量 兩階段判定
function rollPower1() {
    const d = Math.floor(Math.random() * 6) + 1;
    const res = document.getElementById('score-response');
    if (d % 2 !== 0) {
        applyScore(5);
        res.innerHTML = `<p>第一骰：🎲 ${d} (單數) -> <strong>✅ Yes! 獲得 +5分</strong></p>`;
    } else {
        res.innerHTML = `<p>第一骰：🎲 ${d} (雙數) -> <strong>❌ No! 請進行第二次判定：</strong></p>
        <button class="action-btn" onclick="rollPower2()" style="background:#ee5253; color:#fff;">🎲 第二次擲骰判定扣分</button>`;
    }
}

function rollPower2() {
    const d = Math.floor(Math.random() * 6) + 1;
    const s = (d % 2 !== 0) ? -3 : -5;
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>第二骰：🎲 ${d} (${d%2!==0?'單數':'雙數'}) -> <strong>結算 ${s} 分</strong></p>`;
}

function handleKnowledge() {
    const d = Math.floor(Math.random() * 6) + 1;
    let s = (d===1||d===6)?5 : (d===2||d===5)?3 : 0;
    let label = (d===1||d===6)?"🌟 實踐" : (d===2||d===5)?"💡 領悟" : "📖 知道";
    applyScore(s);
    document.getElementById('score-response').innerHTML = `<p>結果：🎲 ${d} -> ${label} (<strong>+${s}分</strong>)</p>`;
}

function handleSpecial(rule) {
    const d = Math.floor(Math.random() * 6) + 1;
    let msg = "";
    if (rule === 'soul') { applyScore(d); msg = `靈魂滿意度：🎲 ${d}，獲得 ${d} 分！`; }
    else if (rule === 'become') { const move = d * 5; msg = `成就位移：前進 ${move} 步！`; gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; }
    else if (rule === 'magic') { const move = d * 10; msg = `奇蹟跳躍：大前進 ${move} 步！`; gameState.currentKin = ((gameState.currentKin + move - 1) % 260) + 1; }
    document.getElementById('score-response').innerHTML = `<p>${msg}</p>`;
    updateUI();
}

function applyScore(s) {
    gameState.totalScore += s;
    document.getElementById('total-score').textContent = gameState.totalScore;
}

initBoard();
</script>
</body>
</html>
