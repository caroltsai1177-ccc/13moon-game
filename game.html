.2s}.score-btn:hover{transform:scale(1.05)}.score-btn.yes{background:#69db7c;color:#1a1a2e}.score-btn.no{background:#ff6b6b;color:#fff}.score-btn.實踐{background:#ffd43b;color:#1a1a2e}.score-btn.領悟{background:#74c0fc;color:#1a1a2e}.score-btn.知道{background:#888;color:#fff}.final-score{background:linear-gradient(135deg,rgba(102,126,234,0.3) 0%,rgba(118,75,162,0.3) 100%);border-radius:15px;padding:30px;text-align:center;margin-top:20px}.final-score h2{margin-bottom:20px}.score-breakdown{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:15px}.score-item{padding:10px 15px;background:rgba(255,255,255,0.1);border-radius:8px}.game-end-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center}.game-end-overlay.show{display:flex}.scroll-hint{text-align:center;color:#666;font-size:0.8em;margin-top:5px}

<body>
  <h1>🌙 13月亮共時旅程</h1>
  <p class="subtitle">測試版 v0.1 — 僅支援紅色牌卡</p>
  <div class="player-status">
    <div class="status-box"><div class="status-label">目前位置</div><div class="status-value" id="current-kin">—</div></div>
    <div class="status-box"><div class="status-label">擲骰結果</div><div class="status-value" id="dice-total">—</div></div>
    <div class="status-box"><div class="status-label">總分</div><div class="status-value" id="total-score">0</div></div>
  </div>
  <div class="dice-area">
    <button class="dice-btn" onclick="rollDice()">🎲 擲骰子</button>
    <div class="dice-result" id="dice-result"></div>
    <div class="dice-history" id="dice-history"></div>
  </div>
  <div class="board">
    <div class="castle"><div class="castle-name red">🔴 紅色城堡 — 東方 · 未知探索 (KIN 1-52)</div><div class="kin-grid" id="castle-red"></div></div>
    <div class="castle"><div class="castle-name white">⚪ 白色城堡 — 北方 · 內觀梳理 (KIN 53-104)</div><div class="kin-grid" id="castle-white"></div></div>
    <div class="castle"><div class="castle-name blue">🔵 藍色城堡 — 西方 · 蛻變進擊 (KIN 105-156)</div><div class="kin-grid" id="castle-blue"></div></div>
    <div class="castle"><div class="castle-name yellow">🟡 黃色城堡 — 南方 · 實踐成就 (KIN 157-208)</div><div class="kin-grid" id="castle-yellow"></div></div>
    <div class="castle"><div class="castle-name green">🟢 綠色城堡 — 中央 · 顯化豐盛 (KIN 209-260)</div><div class="kin-grid" id="castle-green"></div></div>
    <p class="scroll-hint">← 左右滑動查看更多 →</p>
  </div>
  <div class="card-area">
    <div class="card-title" id="card-title">等待抽卡...</div>
    <div id="card-display"></div>
    <div id="score-response"></div>
  </div>
  <div style="text-align:center;margin:20px 0;">
    <button class="dice-btn" onclick="endGame()" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);">結束遊戲並結算</button>
  </div>
  <div class="game-end-overlay" id="game-end">
    <div class="final-score">
      <h2>🏆 遊戲結束！</h2>
      <div class="score-breakdown" id="score-breakdown"></div>
      <div style="margin-top:20px;">
        <button class="dice-btn" onclick="restartGame()" style="background:#69db7c;">重新開始</button>
      </div>
    </div>
  </div>
  <script>
    const redCards=[
{id:'0101',type:'人生練習題',mark:'紅龍',text:'看待人事物過度嚴肅太過認真，導致內在情緒張力較大，對外在的關係之間相較緊繃',score:-5,rule:'直接計分'},
{id:'0102',type:'人生練習題',mark:'紅龍',text:'獨斷傲慢，缺乏學習的態度與精神',score:-5,rule:'直接計分'},
{id:'0103',type:'人生練習題',mark:'紅龍',text:'不願意請求協助，過度承擔責任，累死自己又想要死撐',score:-5,rule:'直接計分'},
{id:'0104',type:'天賦喚醒力',mark:'紅龍',text:'讚讚讚！擁有初生之犢不畏虎的開創精神',score:5,rule:'直接計分'},
{id:'0105',type:'天賦喚醒力',mark:'紅龍',text:'透過持續地自我探索，我更能看見屬於自己獨一無二的價值',score:5,rule:'直接計分'},
{id:'0106',type:'天賦喚醒力',mark:'紅龍',text:'我真棒！主動積極但不贸然衝動行事的行動派',score:5,rule:'直接計分'},
{id:'0107',type:'發揮力量',mark:'紅龍',text:'我鬆綁原生家庭舊有模式的DNA?',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0108',type:'發揮力量',mark:'紅龍',text:'身體是靈魂的神聖殿堂，我懂得用健康的食物滋養他？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0109',type:'發揮力量',mark:'紅龍',text:'我勇於冒險與開創，樂於嘗試具有挑戰性的任務？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0110',type:'發揮力量',mark:'紅龍',text:'我會主動為自己創造新的局面與機會',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0111',type:'知與行',mark:'紅龍',text:'我知道，當我喚醒我是誰，我更會知道我的天賦與生命價值',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0112',type:'知與行',mark:'紅龍',text:'我知道，我的價值來自如何真實地活出自己，而不是來自外界的標準',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0113',type:'知與行',mark:'紅龍',text:'我知道，每一天都是新的開始，去冒險、經驗、嘗試各種可能',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0501',type:'人生練習題',mark:'紅蛇',text:'切斷自我與身體的連結，忽略身體帶給我們的訊息',score:-5,rule:'直接計分'},
{id:'0502',type:'人生練習題',mark:'紅蛇',text:'基於安全感，容易短視近利，只看眼前',score:-5,rule:'直接計分'},
{id:'0503',type:'人生練習題',mark:'紅蛇',text:'容易感受深層的壓力，過度追求金錢與物質',score:-5,rule:'直接計分'},
{id:'0504',type:'天賦喚醒力',mark:'紅蛇',text:'我信任身體的五種感官，去探索認識並學習新事物',score:5,rule:'直接計分'},
{id:'0505',type:'天賦喚醒力',mark:'紅蛇',text:'太棒了！我婉轉變通、能屈能伸，但不會委屈求全',score:5,rule:'直接計分'},
{id:'0506',type:'天賦喚醒力',mark:'紅蛇',text:'學習肚皮舞、森巴舞，讓我找回身體的生命力熱情',score:5,rule:'直接計分'},
{id:'0507',type:'發揮力量',mark:'紅蛇',text:'我擁有充足的睡眠品質及適度運動的健康生活？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0508',type:'發揮力量',mark:'紅蛇',text:'我樂於學習，不斷更新蛻皮，成為升級版的自己？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0509',type:'發揮力量',mark:'紅蛇',text:'我不受外界干擾而驚慌害怕，過度小心翼翼？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0510',type:'發揮力量',mark:'紅蛇',text:'我尊重並回應身體的需求，包括性能量？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0511',type:'知與行',mark:'紅蛇',text:'我知道，善用金錢與樂於賺取金錢同樣重要，因為我更懂得金錢的價值',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0512',type:'知與行',mark:'紅蛇',text:'我知道，活絡身體與五感感官，是更新升級與豐富大腦的路徑',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0513',type:'知與行',mark:'紅蛇',text:'我知道，身體的細胞會記憶，我會有意識地去經驗並儲存美好時光',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0901',type:'人生練習題',mark:'紅月',text:'過度沉溺在負向感受之中，成為受害者的角色',score:-5,rule:'直接計分'},
{id:'0902',type:'人生練習題',mark:'紅月',text:'覺得眼淚是脆弱軟弱的表現，而壓抑情感的流動',score:-5,rule:'直接計分'},
{id:'0903',type:'人生練習題',mark:'紅月',text:'過度感同身受，讓體恤體貼陷入公親變事主的事件中',score:-5,rule:'直接計分'},
{id:'0904',type:'天賦喚醒力',mark:'紅月',text:'我能夠協助他人情緒流動，釋放內在混濁的堵塞',score:5,rule:'直接計分'},
{id:'0905',type:'天賦喚醒力',mark:'紅月',text:'棒棒棒！我允許自己做適當的情感表達，不論是喜怒哀樂',score:5,rule:'直接計分'},
{id:'0906',type:'天賦喚醒力',mark:'紅月',text:'我樂於提供情緒價值，認同接納並支持身邊的人，超給力',score:5,rule:'直接計分'},
{id:'0907',type:'發揮力量',mark:'紅月',text:'我能夠讀懂我的情緒與感受，做好我的情緒管理？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0908',type:'發揮力量',mark:'紅月',text:'我能夠拿捏關係邊界感，避免侵犯他人或被他人侵犯？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0909',type:'發揮力量',mark:'紅月',text:'我擁有豐沛的感知力，是個對生活有溫度有感覺的人？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0910',type:'發揮力量',mark:'紅月',text:'我能夠多喝水、排汗、釋放眼淚，讓身體心理都做好排毒？',score:5,rule:'Yes=+5/No=再骰',extra:'單數-3/雙數-5'},
{id:'0911',type:'知與行',mark:'紅月',text:'我知道，別人無法情緒勒索我，除非我自己願意把頭伸進繩索中',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},
{id:'0912',type:'知與行',mark:'紅月',text:'我知道，療癒是一輩子的功課，是時候讓陽光灑入生活，開始向陽往前走',score:5,rule:'1或6=+5/2或5=+3/3或4=+0',extra:'實踐/領悟/知道'},

function rollDice(){const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1,total=d1+d2;document.getElementById('dice-result').textContent='🎲 '+d1+' + '+d2+' = '+total;document.getElementById('dice-total').textContent=total;gameState.diceHistory.push(total);document.getElementById('dice-history').textContent='歷史: '+gameState.diceHistory.join(', ');gameState.currentKin=Math.min(gameState.currentKin+total,260);updateCurrentPosition();setTimeout(()=>drawCard(),500)}
    function jumpToKin(k){gameState.currentKin=k;updateCurrentPosition();drawCard()}
    function drawCard(){const color=getCastleColor(gameState.currentKin);document.getElementById('card-title').textContent=getColorEmoji(color)+' 抵達 KIN '+gameState.currentKin+'，請抽卡！';const kinLast2=gameState.currentKin%100||1;let card=redCards.find(c=>c.id.startsWith(String(kinLast2).padStart(2,'0')));if(!card)card=redCards[gameState.currentKin%redCards.length];displayCard(card)}
    function displayCard(card){const color='red',colorClass='card-type '+color;let extraInfo='';if(card.rule!=='直接計分'){extraInfo='<div style="margin-top:10px;padding:10px;background:rgba(255,255,255,0.1);border-radius:8px;"><strong>計分方式：</strong>'+card.rule+'<br><small>'+(card.extra||'')+'</small></div>'}document.getElementById('card-display').innerHTML='<div class="card"><div class="card-header"><span class="'+colorClass+'">'+card.type+'</span><span class="card-badge">'+card.mark+'</span></div><p class="card-text">'+card.text+'</p><div class="card-score">基本分數: '+(card.score>0?'+':'')+card.score+'</div>'+extraInfo+'</div>';showScoreResponse(card)}
    function showScoreResponse(card){const c=document.getElementById('score-response');if(card.rule==='直接計分'){gameState.totalScore+=card.score;gameState.cardScores[card.type]=(gameState.cardScores[card.type]||0)+card.score;document.getElementById('total-score').textContent=gameState.totalScore;c.innerHTML='<div class="score-response">直接獲得 <strong>'+(card.score>0?'+':'')+card.score+'</strong> 分！</div>';return}if(card.type==='發揮力量'){c.innerHTML='<div class="score-response"><p>這題你做到了嗎？</p><div class="score-input"><button class="score-btn yes" onclick="answerYes()">✅ Yes (+5)</button><button class="score-btn no" onclick="answerNo()">❌ No (再骰)</button></div></div>';return}if(card.type==='知與行'){c.innerHTML='<div class="score-response"><p>你現在是什麼狀態？</p><div class="score-input"><button class="score-btn 實踐" onclick="answerZhiYu(5)">🌟 實踐 (+5)</button><button class="score-btn 領悟" onclick="answerZhiYu(3)">💡 領悟 (+3)</button><button class="score-btn 知道" onclick="answerZhiYu(0)">📖 知道 (+0)</button></div></div>';return}c.innerHTML=''}
    function answerYes(){gameState.totalScore+=5;gameState.cardScores['發揮力量']=(gameState.cardScores['發揮力量']||0)+5;document.getElementById('total-score').textContent=gameState.totalScore;document.getElementById('score-response').innerHTML='<div class="score-response">✅ Yes！獲得 <strong>+5</strong> 分！</div>'}
    function answerNo(){const d=Math.floor(Math.random()*6)+1,s=d%2===1?-3:-5;gameState.totalScore+=s;document.getElementById('total-score').textContent=gameState.totalScore;document.getElementById('score-response').innerHTML='<div class="score-response">再骰結果: '+d+' → <strong>'+(s>0?'+':'')+s+'</strong> 分</div>'}

    function answerZhiYu(s){gameState.totalScore+=s;gameState.cardScores['知與行']=(gameState.cardScores['知與行']||0)+s;document.getElementById('total-score').textContent=gameState.totalScore;const label=s===5?'🌟 實踐':s===3?'💡 領悟':'📖 知道';document.getElementById('score-response').innerHTML='<div class="score-response">'+label+'！獲得 <strong>'+(s>0?'+':'')+s+'</strong> 分</div>'}
    function endGame(){const b=document.getElementById('score-breakdown');b.innerHTML='<div class="score-item">🎴 總分: <strong>'+gameState.totalScore+'</strong></div>'+Object.entries(gameState.cardScores).map(([t,s])=>'<div class="score-item">'+t+': <strong>'+s+'</strong></div>').join('');document.getElementById('game-end').classList.add('show')}

function restartGame(){gameState={currentKin:1,totalScore:0,diceHistory:[],cardScores:{'人生練習題':0,'天賦喚醒力':0,'發揮力量':0,'知與行':0}};document.getElementById('total-score').textContent='0';document.getElementById('dice-result').textContent='';document.getElementById('dice-history').textContent='';document.getElementById('card-display').innerHTML='';document.getElementById('score-response').innerHTML='';document.getElementById('card-title').textContent='等待抽卡...';document.getElementById('game-end').classList.remove('show');updateCurrentPosition()}
    function getColorEmoji(c){return{red:'🔴',white:'⚪',blue:'🔵',yellow:'🟡',green:'🟢'}[c]||'⚪'}
    initBoard();
  </script>
</body>
</html>
